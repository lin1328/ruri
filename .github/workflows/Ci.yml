name: Cmake and Autotools

on:
  push:
    paths:
      - CMakeLists.txt
      - configure.ac
  workflow_dispatch:

jobs:
  Cmake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HOST_TRIPLE: x86_64-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y autoconf automake autopoint binutils bison build-essential cmake doxygen gettext gperf libc6-dev libtool ninja-build pkg-config po4a qemu-user-static tar texinfo texlive valgrind xz-utils

      - name: libcap and libseccomp
        shell: bash
        run: |
          # libcap
          LIBCAP_TAG="$(
            git ls-remote --tags --refs https://git.kernel.org/pub/scm/libs/libcap/libcap.git 'refs/tags/libcap-*' \
              | sed 's#.*refs/tags/##' \
              | grep -E '^libcap-[0-9]+(\.[0-9]+)+$' \
              | sort -V \
              | tail -n 1
          )"

          wget "https://www.kernel.org/pub/linux/libs/security/linux-privs/libcap2/${LIBCAP_TAG}.tar.gz"
          tar -xzf "${LIBCAP_TAG}.tar.gz" -C .

          make -C "${LIBCAP_TAG}/libcap" BUILD_CC=gcc \
            CC="${HOST_TRIPLE}-gcc" \
            SHARED=no GOLANG=no PAM_CAP=no DYNAMIC=no lib=lib \
            COPTS="-O2 -fstack-protector-strong -D_FORTIFY_SOURCE=2 -Wformat -Werror=format-security" \
            prefix=$(pwd)/out \
            install

          # libseccomp
          LIBSECCOMP_TARBALL=""
          LIBSECCOMP_TARBALL_URL=""
          read -r LIBSECCOMP_TARBALL LIBSECCOMP_TARBALL_URL < <(
            curl -fsSL https://api.github.com/repos/seccomp/libseccomp/releases/latest \
              | jq -r 'first(.assets[] | select(.name | test("^libseccomp-[0-9]+(\\.[0-9]+)+\\.tar\\.gz$")) | [.name, .browser_download_url] | @tsv) // empty'
          )

          LIBSECCOMP_DIR="${LIBSECCOMP_TARBALL%.tar.gz}"

          wget "$LIBSECCOMP_TARBALL_URL"
          tar -xzf "$LIBSECCOMP_TARBALL" -C .
          cd "$LIBSECCOMP_DIR"

          if [ ! -f configure ]; then
            autoreconf -fi
          fi
          ./configure --disable-shared --enable-static \
            --prefix=$(pwd)/../out \
            ${HOST_TRIPLE:+--host=${HOST_TRIPLE}}

          make && make install

      - name: ruri (Cmake)
        shell: bash
        run: |
          cmake -S . -B x86_64 \
            -DCMAKE_C_COMPILER="${HOST_TRIPLE}-gcc" \
            -DENABLE_STATIC=ON \
            -DCMAKE_FIND_ROOT_PATH=$(pwd)/out

          cmake --build x86_64 --parallel
          ./x86_64/ruri -v

      - name: ruri (Autotools)
        shell: bash
        run: |
          autoreconf -fi
          ./configure --enable-static ${HOST_TRIPLE:+--host=${HOST_TRIPLE}} \
            CPPFLAGS="-I$(pwd)/out/include" \
            LDFLAGS="-L$(pwd)/out/lib"

          make -j$(nproc)
          ./ruri -v && make distclean

      - name: ruri (Autotools Android Core)
        shell: bash
        run: |
          sudo apt install -y qemu-user-static

          ./configure --enable-static --enable-coreonly --host=aarch64-linux-android \
              CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang \
              AR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar \
              RANLIB=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          make && qemu-aarch64-static ./ruri -v
